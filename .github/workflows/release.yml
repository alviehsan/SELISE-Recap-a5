name: Release

# Builds signed installers for SELISE Recap a5 from the PRIVATE source repo
# (alviehsan/Codex---SELISE-Meeting-App) and publishes them HERE — this repo
# is public, so GitHub Actions minutes are free (private-repo runners, macOS
# especially, bill real money and were blocking releases behind a manual
# "flip repo public, build, flip back" dance). Moving the build here removes
# that dance permanently.
#
# Trigger: the source repo's tiny `.github/workflows/trigger-release.yml`
# fires a `repository_dispatch` (type: build-release) with the tag name in
# `client_payload.tag` whenever a `v*` tag is pushed there. `workflow_dispatch`
# below is for manual/test runs — supply the same tag by hand.
#
# The source repo is checked out here via SOURCE_REPO_PAT, a fine-grained PAT
# scoped to READ-ONLY content access on that one private repo — it can check
# out code, nothing else. Nothing from the private repo is committed or
# published anywhere except the compiled installers below.

on:
  repository_dispatch:
    types: [build-release]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v0.12.1) — must exist in the source repo'
        required: true

env:
  RELEASE_TAG: ${{ github.event.client_payload.tag || inputs.tag }}
  SOURCE_REPO: alviehsan/Codex---SELISE-Meeting-App

jobs:
  build:
    permissions:
      contents: write     # needed to create the GitHub Release, here in this repo
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin      # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin        # Intel Macs
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc      # primary: ~95% of users
            args: '--target x86_64-pc-windows-msvc'
          - platform: windows-latest
            target: aarch64-pc-windows-msvc     # Surface / Snapdragon ARM
            args: '--target aarch64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    # ARM64 Windows is best-effort (whisper.cpp x64→ARM64 cross-compile is
    # unresolved); don't let it fail the release of the x64 + macOS installers.
    continue-on-error: ${{ matrix.target == 'aarch64-pc-windows-msvc' }}
    steps:
      # Check out the PRIVATE source repo's tagged commit — NOT this repo.
      # SOURCE_REPO_PAT is scoped to contents:read on that one repo only.
      - name: Check out source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      # macOS only: build the Swift capture/transcription sidecars that
      # tauri.conf.json bundles as resources. (No equivalent on Windows — the
      # platform/windows.rs path replaces them with in-process Win32 code.)
      - name: Build macOS native sidecars
        if: matrix.platform == 'macos-latest'
        run: npm run native:release

      # whisper.cpp (whisper-rs) builds via CMake. windows-latest ships CMake, so
      # x64 is fine; ARM64 cross-compile needs clang-cl + Ninja because ggml
      # refuses MSVC on ARM. (Mirrors the same step in ci.yml.)
      - name: Set up clang toolchain for ARM64 whisper.cpp build
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          # Built from a PowerShell array — a here-string at col 0 breaks the YAML,
          # and an indented closing '@ breaks PowerShell. The array avoids both.
          $lines = @(
            'set(CMAKE_SYSTEM_NAME Windows)',
            'set(CMAKE_SYSTEM_PROCESSOR ARM64)',
            'set(CMAKE_C_COMPILER clang-cl)',
            'set(CMAKE_CXX_COMPILER clang-cl)',
            'set(CMAKE_C_FLAGS_INIT "--target=aarch64-pc-windows-msvc")',
            'set(CMAKE_CXX_FLAGS_INIT "--target=aarch64-pc-windows-msvc")',
            'set(CMAKE_EXE_LINKER_FLAGS_INIT "/machine:ARM64")',
            'set(CMAKE_SHARED_LINKER_FLAGS_INIT "/machine:ARM64")',
            'set(CMAKE_C_COMPILER_WORKS 1 CACHE BOOL "skip")',
            'set(CMAKE_CXX_COMPILER_WORKS 1 CACHE BOOL "skip")'
          )
          Set-Content -Path "$env:RUNNER_TEMP\aarch64-clang.cmake" -Value $lines -Encoding ascii
          echo "CMAKE_TOOLCHAIN_FILE=$env:RUNNER_TEMP\aarch64-clang.cmake" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      # ── macOS code signing (SELF-SIGNED, for STABLE TCC + Keychain across
      #    auto-updates). See the source repo's release.yml history for the
      #    full rationale — unchanged here, just relocated.
      - name: Import macOS signing certificate (self-signed OR Developer ID)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE secret not set — building unsigned (ad-hoc)."
            exit 0
          fi
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p tmppw "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p tmppw "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k tmppw "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"
          case "$APPLE_SIGNING_IDENTITY" in
            "Developer ID Application"*)
              curl -sSf -o "$RUNNER_TEMP/DeveloperIDG2CA.cer" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
              security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN" || true
              ;;
            *)
              # This CN matches the certificate baked into the APPLE_CERTIFICATE
              # secret (a pre-generated .p12), NOT anything generated per-run. Do NOT
              # rename this string alone — it must equal the cert's real Common Name
              # or `find-certificate -c` returns nothing and the build aborts.
              # (Cert regenerated 2026-07-16 with this CN — the old
              # "MeetRec Self-Signed (SELISE)" cert was lost; §5f rebrand done here.)
              security find-certificate -c "SELISE Recap a5 Self-Signed" -p "$KEYCHAIN" > "$RUNNER_TEMP/cert.pem"
              sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain "$RUNNER_TEMP/cert.pem"
              ;;
          esac
          security find-identity -v -p codesigning "$KEYCHAIN" | grep -q "1 valid identities found" || {
            echo "::error::signing identity not valid after trust — aborting before a broken bundle"; exit 1; }

      # NOTE on sidecar signing: do NOT add a standalone re-sign step here — it
      # gets clobbered. tauri.macos.conf.json's beforeBuildCommand re-runs
      # `npm run native:release` INSIDE `cargo tauri build`, rebuilding and
      # re-signing the sidecars right before bundling. SIGN_IDENTITY is passed
      # to the tauri-action step below so build-native.sh — the LAST signer
      # before bundling — signs with the stable identity.

      # ── Notarization gate (Developer ID only) ────────────────────────────
      # tauri-bundler enters its notarize path whenever APPLE_ID / APPLE_PASSWORD
      # / APPLE_TEAM_ID are DEFINED — and GitHub Actions defines an env key even
      # when the secret is unset (as an empty string). Only export them to
      # $GITHUB_ENV when ALL THREE are non-empty, so the self-signed path keeps
      # them genuinely absent (notarization skipped).
      - name: Enable notarization when Developer ID secrets are present
        if: runner.os == 'macOS'
        env:
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$_APPLE_ID" ] && [ -n "$_APPLE_PASSWORD" ] && [ -n "$_APPLE_TEAM_ID" ]; then
            {
              echo "APPLE_ID=$_APPLE_ID"
              echo "APPLE_PASSWORD=$_APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "notarization: ENABLED (Developer ID secrets present)"
          else
            echo "notarization: skipped (self-signed; Developer ID secrets absent)"
          fi

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # ── Windows signing (Azure Trusted Signing) — via tauri.conf.json bundle.windows.signCommand
          # ── Tauri auto-updater signature ──
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'SELISE Recap a5 ${{ env.RELEASE_TAG }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false

      # ── Human-download .zip of the macOS app ──────────────────────────────
      - name: Zip the macOS .app for direct download
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          app_dir="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          app="$(ls -d "$app_dir"/*.app 2>/dev/null | head -1)"
          if [ -z "$app" ]; then echo "::error::no .app found under $app_dir"; exit 1; fi
          ver="${RELEASE_TAG#v}"
          case "${{ matrix.target }}" in aarch64*) arch=aarch64 ;; *) arch=x64 ;; esac
          zip="SELISE.Recap.a5_${ver}_${arch}.zip"
          ditto -c -k --keepParent "$app" "$zip"
          gh release upload "${RELEASE_TAG}" "$zip" --repo "${{ github.repository }}" --clobber
          echo "Uploaded $zip"

      # ── Human-download .zip of the Windows installer ──────────────────────
      - name: Zip the Windows installer for direct download
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $nsisDir = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          $exe = Get-ChildItem -Path $nsisDir -Filter *-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { Write-Error "no -setup.exe found under $nsisDir"; exit 1 }
          $ver = "${env:RELEASE_TAG}".TrimStart('v')
          $arch = if ("${{ matrix.target }}" -like "aarch64*") { "arm64" } else { "x64" }
          $zip = "SELISE.Recap.a5_${ver}_${arch}-setup.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zip -Force
          gh release upload "${env:RELEASE_TAG}" $zip --repo "${{ github.repository }}" --clobber
          Write-Host "Uploaded $zip"
